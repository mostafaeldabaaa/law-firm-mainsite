<div class="app-shell" [class.rtl]="isRtl" [class.mobile-menu-open]="mobileMenuOpen">

  <!-- Overlay خلفية للموبايل -->
  <div class="sidebar-overlay" *ngIf="mobileMenuOpen" (click)="closeMobileMenu()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed" [class.mobile-open]="mobileMenuOpen">
    <div class="sidebar-header">
      <img src="/assets/images/logo.png" alt="محسن عبدالله للمحاماة" class="logo-icon" style="width: 28px; height: 28px; object-fit: contain;" />
      <span class="logo-text" *ngIf="!sidebarCollapsed">محسن عبدالله</span>
      <button class="collapse-btn" (click)="sidebarCollapsed = !sidebarCollapsed">
        {{ sidebarCollapsed ? '›' : '‹' }}
      </button>
      <!-- زرار قفل خاص بالموبايل -->
      <button class="mobile-close-btn" (click)="closeMobileMenu()">✕</button>
    </div>

    <nav class="sidebar-nav" (click)="closeMobileMenu()">
      <ng-container>
        <div class="nav-divider" *ngIf="!sidebarCollapsed"><span>القائمة الرئيسية</span></div>
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z"/></svg>
          </span>
          <span class="nav-label" *ngIf="!sidebarCollapsed">لوحة التحكم</span>
        </a>
      </ng-container>

      <div class="nav-divider" *ngIf="!sidebarCollapsed"><span>إدارة المكتب</span></div>

      <a *ngIf="!isClient" routerLink="/cases" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">القضايا</span>
      </a>
      <a *ngIf="!isClient" routerLink="/sessions" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 3v3m8-3v3M4 9h16M5 6h14a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">الجلسات</span>
      </a>
      <a *ngIf="!isClient" routerLink="/clients" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-6a4 4 0 11-8 0 4 4 0 018 0zm6 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">العملاء</span>
      </a>
      <a *ngIf="!isClient" routerLink="/lawyers" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18m-7-4h14M5 8l3-4 3 4m-6 0a3 3 0 106 0m4 0l3-4 3 4m-6 0a3 3 0 106 0"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">المحامون</span>
      </a>

      <!-- المستندات: متاحة لكل الأدوار بما فيهم العميل -->
      <a *ngIf="!isClient" routerLink="/documents" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7 3h7l5 5v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1zM9 12h6M9 16h6M9 8h2"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">المستندات</span>
      </a>

      <a *ngIf="!isClient" routerLink="/tasks" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 11l3 3L22 4M9 17l3 3 3-3M3 7h6M3 12h6M3 17h6"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">المهام</span>
      </a>
      <a *ngIf="!isClient" routerLink="/deadlines" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3.5 2"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">المواعيد القانونية</span>
      </a>

      <!-- الاستشارات: متاحة لكل الأدوار بما فيهم العميل -->
      <a routerLink="/consultations" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12c0 4.418-4.03 8-9 8a9.86 9.86 0 01-4-.8L3 20l1.05-3.15A7.9 7.9 0 013 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">الاستشارات</span>
      </a>

      <a *ngIf="!isClient" routerLink="/reports" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 19V9m6 10V5m6 14v-7"/></svg>
        </span>
        <span class="nav-label" *ngIf="!sidebarCollapsed">التقارير</span>
      </a>

      <!-- Admin only -->
      <ng-container *ngIf="isAdmin">
        <div class="nav-divider" *ngIf="!sidebarCollapsed"><span>النظام</span></div>
        <a routerLink="/users" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span class="nav-label" *ngIf="!sidebarCollapsed">المستخدمون</span>
        </a>
      </ng-container>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main-wrap">
    <header class="topbar flex items-center justify-between gap-4 px-6 py-3 bg-white border-b border-gray-100">
      <!-- يمين: الهمبرجر + المستخدم + الإعدادات + الإشعارات -->
      <div class="flex items-center gap-4">

        <!-- زرار الهمبرجر: يظهر بس على الموبايل والتابلت -->
        <button class="hamburger-btn" (click)="toggleMobileMenu()" aria-label="فتح القائمة">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <div class="user-menu relative flex items-center gap-2.5 cursor-pointer" (click)="userMenuOpen = !userMenuOpen">
          <span class="w-9 h-9 rounded-full bg-gradient-to-br from-[#0f1d33] to-[#16294a] text-amber-400 flex items-center justify-center text-sm font-bold shrink-0">{{ userInitial }}</span>
          <div class="leading-tight hidden sm:block">
            <div class="text-sm font-semibold text-[#0f1d33]">{{ user?.name }}</div>
            <div class="text-xs text-gray-400">{{ roleLabel }}</div>
          </div>
          <div class="absolute top-11 right-0 bg-white border border-gray-100 rounded-xl shadow-lg py-1.5 min-w-[140px] z-50" *ngIf="userMenuOpen">
            <button (click)="logout()" class="w-full text-right text-sm text-gray-600 hover:bg-gray-50 px-4 py-2">تسجيل الخروج</button>
          </div>
        </div>

        <button class="w-9 h-9 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors shrink-0" title="الإعدادات">
          ⚙️
        </button>

        <a routerLink="/notifications" class="relative w-9 h-9 rounded-full bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors no-underline shrink-0" title="الإشعارات">
          🔔
          <span class="absolute -top-0.5 -left-0.5 w-2.5 h-2.5 rounded-full bg-red-500 border-2 border-white" *ngIf="unreadCount > 0"></span>
        </a>
      </div>

      <!-- وسط: البحث -->
      <div class="search-wrap hidden md:block flex-1 max-w-xs">
        <input type="search" placeholder="بحث..." (keyup.enter)="onSearch($event)"
               class="w-full text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-full px-4 py-2 text-right focus:outline-none focus:ring-2 focus:ring-amber-500/10" />
      </div>

      <!-- شمال: breadcrumb -->
      <div class="breadcrumb-wrap hidden sm:flex items-center gap-2 text-sm shrink-0">
        <span class="text-gray-400">نظام المحاماة</span>
        <span class="text-gray-300">/</span>
        <span class="text-[#0f1d33] font-medium">{{ pageTitle }}</span>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
