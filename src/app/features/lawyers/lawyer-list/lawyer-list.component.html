<div dir="rtl" class="min-h-screen bg-[#0d1320] px-6 py-8 font-[Tahoma,'Segoe UI',sans-serif]">

  <!-- Header -->
  <div class="mb-8 flex items-center justify-between">
    <div class="rounded-full border border-slate-700/60 bg-[#11192a] px-4 py-1.5 text-sm text-slate-300">
      {{ lawyers.length }} محامٍ
    </div>

    <div class="text-right">
      <div class="mb-1 text-xs tracking-wide text-[#d4af37]/80">نظام المحاماة</div>
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-white">المحامون</h1>
        <span class="text-2xl">🧑‍⚖️</span>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="relative mb-6">
    <input
      type="search"
      [(ngModel)]="search"
      (input)="filter()"
      placeholder="بحث بالاسم أو البريد الإلكتروني..."
      class="w-full rounded-xl border border-slate-700/60 bg-[#11192a] py-3 pr-5 pl-12 text-sm text-slate-200 placeholder:text-slate-500 outline-none transition focus:border-[#d4af37]/50 focus:ring-1 focus:ring-[#d4af37]/30"
    />
    <svg class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z" />
    </svg>
  </div>

  <!-- Role tabs -->
  <div class="mb-8 flex flex-wrap justify-center gap-3">
    <button
      *ngFor="let tab of roleTabs"
      (click)="setRole(tab.value)"
      [class]="activeRole === tab.value
        ? 'rounded-full border border-transparent bg-[#d4af37] px-5 py-2 text-sm font-medium text-[#0d1320] transition'
        : 'rounded-full border border-slate-700 bg-transparent px-5 py-2 text-sm font-medium text-slate-300 transition hover:border-[#d4af37]/60 hover:text-[#d4af37]'"
    >
      {{ tab.label }}
      <span class="mr-1 text-xs opacity-70">({{ countByRole(tab.value) }})</span>
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="py-24 text-center text-slate-500">
    <div class="mx-auto mb-3 h-8 w-8 animate-spin rounded-full border-2 border-slate-700 border-t-[#d4af37]"></div>
    جاري التحميل...
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && filtered.length === 0" class="py-24 text-center text-slate-500">
    <div class="mb-3 text-5xl">🧑‍⚖️</div>
    <p>لا يوجد محامون</p>
  </div>

  <!-- Cards grid -->
  <div *ngIf="!loading && filtered.length > 0" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <div
      *ngFor="let l of filtered"
      [routerLink]="['/lawyers', l._id]"
      class="group flex cursor-pointer items-start gap-4 rounded-2xl border border-slate-700/40 bg-[#11192a] p-5 transition hover:border-[#d4af37]/40 hover:shadow-lg hover:shadow-black/30"
    >
      <!-- Avatar -->
      <div class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-[#2d4a8a] to-[#1a2744] text-lg font-bold text-white">
        {{ getName(l).charAt(0) }}
      </div>

      <!-- Info -->
      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <h3 class="truncate text-base font-semibold text-white">{{ getName(l) }}</h3>
          <span
            class="flex-shrink-0 rounded-full px-2.5 py-0.5 text-xs font-medium"
            [class]="isActive(l) ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'"
          >
            {{ isActive(l) ? 'نشط' : 'غير نشط' }}
          </span>
        </div>

        <span class="mt-1.5 inline-block rounded-full px-2.5 py-0.5 text-xs font-medium" [class]="roleColor(getRole(l))">
          {{ roleLabel(getRole(l)) }}
        </span>

        <div class="mt-3 space-y-1.5 text-sm text-slate-400">
          <div class="flex items-center gap-2 truncate">
            <svg class="h-3.5 w-3.5 flex-shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <span class="truncate">{{ getEmail(l) || '-' }}</span>
          </div>
          <div class="flex items-center gap-2" *ngIf="getPhone(l)">
            <svg class="h-3.5 w-3.5 flex-shrink-0 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.95.68l1.5 4.5a1 1 0 01-.27 1.05L9.1 10.6a11 11 0 005.4 5.4l1.37-1.36a1 1 0 011.05-.27l4.5 1.5a1 1 0 01.68.95V21a2 2 0 01-2 2h-1C9.16 23 1 14.84 1 5V4z" />
            </svg>
            <span>{{ getPhone(l) }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
