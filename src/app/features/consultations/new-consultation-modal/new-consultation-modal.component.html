<!-- new-consultation-modal.component.html -->
<div
  dir="rtl"
  class="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50 p-0 sm:px-4"
  (click)="close.emit()">

  <div
    (click)="$event.stopPropagation()"
    class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md p-5 sm:p-6 shadow-xl max-h-[90vh] overflow-y-auto">

    <div class="flex items-center justify-between mb-5">
      <button class="text-gray-400 hover:text-gray-600" (click)="close.emit()">✕</button>
      <h2 class="text-base sm:text-lg font-bold text-gray-900">استشارة جديدة</h2>
    </div>

    <div class="space-y-4 text-right">
      @if (!isSelfClient()) {
        <div>
          <label class="block text-sm text-gray-600 mb-1.5">العميل</label>
          <select
            [(ngModel)]="clientId"
            [ngModelOptions]="{ standalone: true }"
            class="w-full text-sm text-gray-900 bg-white border border-gray-200 rounded-lg px-3.5 py-2.5 text-right focus:outline-none focus:ring-2 focus:ring-gray-900/10">
            <option value="">{{ loadingClients() ? 'جاري تحميل العملاء...' : 'اختر العميل' }}</option>
            @for (c of clients(); track c._id) {
              <option [value]="c._id">{{ clientDisplayName(c) }}</option>
            }
          </select>
          @if (submitted() && !clientId().trim()) {
            <p class="text-xs text-red-500 mt-1">يرجى اختيار العميل</p>
          }
        </div>
      }

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">عنوان الاستشارة</label>
        <input
          [(ngModel)]="title"
          [ngModelOptions]="{ standalone: true }"
          type="text"
          placeholder="مثال: استفسار عن عقد إيجار"
          class="w-full text-sm text-gray-900 placeholder-gray-400 bg-white border border-gray-200 rounded-lg px-3.5 py-2.5 text-right focus:outline-none focus:ring-2 focus:ring-gray-900/10" />
        @if (submitted() && !title().trim()) {
          <p class="text-xs text-red-500 mt-1">يرجى إدخال عنوان الاستشارة</p>
        }
      </div>

      <div>
        <label class="block text-sm text-gray-600 mb-1.5">تفاصيل الاستفسار</label>
        <textarea
          [(ngModel)]="initialMessage"
          [ngModelOptions]="{ standalone: true }"
          rows="4"
          placeholder="اكتب وصفاً موجزاً لاستشارتك..."
          class="w-full text-sm text-gray-900 bg-white border border-gray-200 rounded-lg px-3.5 py-2.5 text-right focus:outline-none focus:ring-2 focus:ring-gray-900/10"></textarea>
        @if (submitted() && !initialMessage().trim()) {
          <p class="text-xs text-red-500 mt-1">يرجى كتابة تفاصيل الاستفسار</p>
        }
      </div>
    </div>

    <div class="flex flex-col-reverse sm:flex-row items-center gap-2 mt-6">
      <button
        (click)="close.emit()"
        class="w-full sm:w-auto px-4 py-2.5 text-sm font-medium text-gray-600 rounded-lg border border-gray-200 hover:bg-gray-50">
        إلغاء
      </button>
      <button
        (click)="submit()"
        class="w-full sm:flex-1 bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium px-4 py-2.5 rounded-lg">
        إنشاء الاستشارة
      </button>
    </div>
  </div>
</div>
